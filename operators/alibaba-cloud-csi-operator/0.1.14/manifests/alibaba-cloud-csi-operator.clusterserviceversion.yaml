          app.kubernetes.io/name: alibaba-cloud-csi-operator
          control-plane: controller-manager
        name: alibaba-cloud-csi-operator-controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: alibaba-cloud-csi-operator
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                app.kubernetes.io/name: alibaba-cloud-csi-operator
                control-plane: controller-manager
            spec:
