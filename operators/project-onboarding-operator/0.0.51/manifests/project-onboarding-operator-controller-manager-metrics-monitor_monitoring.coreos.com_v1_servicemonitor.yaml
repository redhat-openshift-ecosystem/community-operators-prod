apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: project-onboarding-operator
    control-plane: controller-manager
  name: project-onboarding-operator-controller-manager-metrics-monitor
spec:
  endpoints:
  - authorization:
      credentials:
        key: token
        name: controller-manager-metrics-reader-token
      type: Bearer
    path: /metrics
    port: https
    scheme: https
    tlsConfig:
      insecureSkipVerify: true
  selector:
    matchLabels:
      app.kubernetes.io/name: project-onboarding-operator
      control-plane: controller-manager
