      - description: IstioCNI represents a deployment of the Istio CNI component.
        displayName: Istio CNI
        kind: IstioCNI
        name: istiocnis.sailoperator.io
        specDescriptors:
        - description: |-
            Defines the version of Istio to install.
            Must be one of: v1.29-latest, v1.29.1, v1.29.0, v1.28-latest, v1.28.5, v1.28.4, v1.28.3, v1.28.2, v1.28.1, v1.28.0, master, v1.30-alpha.0577d34d.
          displayName: Istio Version
          path: version
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:General
          - urn:alm:descriptor:com.tectonic.ui:select:v1.29-latest
          - urn:alm:descriptor:com.tectonic.ui:select:v1.29.1
          - urn:alm:descriptor:com.tectonic.ui:select:v1.29.0
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28-latest
