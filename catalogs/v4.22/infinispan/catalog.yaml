    installModes:
    - supported: true
      type: OwnNamespace
    - supported: true
      type: SingleNamespace
    - supported: true
      type: MultiNamespace
    - supported: true
      type: AllNamespaces
    keywords:
    - infinispan
    - key value
    - database
    - datagrid
    - open source
    labels:
      operatorframework.io/arch.amd64: supported
      operatorframework.io/arch.arm64: supported
    links:
    - name: Blog
      url: https://blog.infinispan.org/
    - name: Documentation
      url: https://infinispan.org/documentation
    - name: Chat
      url: https://infinispan.zulipchat.com/#narrow/stream/185835-infinispan-cloud
    - name: Operator Source Code
      url: https://github.com/infinispan/infinispan-operator
    maintainers:
    - email: infinispan-dev@lists.jboss.org
      name: Infinispan Community
    maturity: alpha
    minKubeVersion: 1.24.0
    provider:
      name: Infinispan
