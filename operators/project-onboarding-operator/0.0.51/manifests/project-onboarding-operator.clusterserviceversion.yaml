  description: |
    Operator for OpenShift project/tenant onboarding. Reconciles tenant Namespaces, ResourceQuotas,
    LimitRanges, NetworkPolicies, OpenShift Groups, RoleBindings, and EgressIPs from a
    single ProjectOnboarding custom resource. Optionally, pre-define project sizes (S, M, L, ...)
    via TShirtSize custom resources can be leveraged.

    Install cluster-wide (AllNamespaces). Create cluster-scoped ProjectOnboarding CRs;
    each CR manages tenant namespaces listed in spec.namespaces.
  displayName: Project Onboarding
  icon:
  - base64data: 
    mediatype: image/png
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        - apiGroups:
          - ""
          resources:
          - limitranges
          - namespaces
          - resourcequotas
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - argoproj.io
          resources:
          - appprojects
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - k8s.ovn.org
          resources:
          - egressips
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - networking.k8s.io
          resources:
          - networkpolicies
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - onboarding.stderr.at
          resources:
          - projectonboardings
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - onboarding.stderr.at
          resources:
          - projectonboardings/finalizers
          verbs:
          - update
        - apiGroups:
          - onboarding.stderr.at
          resources:
          - projectonboardings/status
          - tshirtsizes/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - onboarding.stderr.at
          resources:
          - tshirtsizes
          verbs:
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - rbac.authorization.k8s.io
          resourceNames:
          - admin
          - edit
          - view
          resources:
          - clusterroles
          verbs:
          - bind
        - apiGroups:
          - rbac.authorization.k8s.io
          resources:
          - rolebindings
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - user.openshift.io
          resources:
          - groups
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - authentication.k8s.io
          resources:
          - tokenreviews
          verbs:
          - create
        - apiGroups:
          - authorization.k8s.io
          resources:
          - subjectaccessreviews
          verbs:
          - create
        - nonResourceURLs:
          - /metrics
          verbs:
          - get
        serviceAccountName: project-onboarding-operator-controller-manager
      deployments:
      - label:
          app.kubernetes.io/managed-by: kustomize
          app.kubernetes.io/name: project-onboarding-operator
          control-plane: controller-manager
        name: project-onboarding-operator-controller-manager
        spec:
          replicas: 3
          selector:
            matchLabels:
              app.kubernetes.io/name: project-onboarding-operator
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                app.kubernetes.io/name: project-onboarding-operator
                control-plane: controller-manager
            spec:
              affinity:
                podAntiAffinity:
                  preferredDuringSchedulingIgnoredDuringExecution:
                  - podAffinityTerm:
                      labelSelector:
                        matchLabels:
                          app.kubernetes.io/name: project-onboarding-operator
                          control-plane: controller-manager
                      topologyKey: kubernetes.io/hostname
                    weight: 100
              containers:
              - args:
                - --metrics-bind-address=:8443
                - --leader-elect
                - --health-probe-bind-address=:8081
                command:
                - /manager
                env:
                - name: DEBUG
                  value: "false"
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                image: quay.io/tjungbau/project-onboarding-operator@sha256:9c440e0a6f21934a3ca54dca61a2099599500618a1abaf59964bed65110ee333
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                ports:
                - containerPort: 8443
                  name: https
                  protocol: TCP
                - containerPort: 9443
                  name: webhook-server
                  protocol: TCP
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 256Mi
                  requests:
                    cpu: 50m
                    memory: 128Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
                volumeMounts:
                - mountPath: /tmp/k8s-webhook-server/serving-certs
                  name: webhook-certs
                  readOnly: true
              securityContext:
                runAsGroup: 65532
                runAsNonRoot: true
                runAsUser: 65532
                seccompProfile:
                  type: RuntimeDefault
              serviceAccountName: project-onboarding-operator-controller-manager
              terminationGracePeriodSeconds: 10
              volumes:
              - name: webhook-certs
                secret:
                  defaultMode: 420
                  secretName: webhook-server-cert
      permissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        serviceAccountName: project-onboarding-operator-controller-manager
    strategy: deployment
