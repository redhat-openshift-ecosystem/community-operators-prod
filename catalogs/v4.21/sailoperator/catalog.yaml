          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.2
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.1
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.0
          - urn:alm:descriptor:com.tectonic.ui:select:v1.27-latest
          - urn:alm:descriptor:com.tectonic.ui:select:v1.27.8
          - urn:alm:descriptor:com.tectonic.ui:select:v1.27.7
