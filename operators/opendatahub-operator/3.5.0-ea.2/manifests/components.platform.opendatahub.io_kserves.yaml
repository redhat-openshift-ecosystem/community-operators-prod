    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Kserve is the Schema for the kserves API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: KserveSpec defines the desired state of Kserve
            properties:
              modelCache:
                description: Configures and enables Model Cache integration
                properties:
                  cacheSize:
                    anyOf:
                    - type: integer
                    - type: string
                    description: |-
                      CacheSize specifies the storage capacity for the model cache PersistentVolume
                      and PersistentVolumeClaim (e.g., "100Gi", "500Gi", "1Ti").
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  managementState:
                    default: Removed
                    enum:
                    - Managed
                    - Removed
                    pattern: ^(Managed|Unmanaged|Force|Removed)$
                    type: string
                  nodeNames:
                    description: |-
                      NodeNames is a list of specific node names to enable model caching on.
                      The operator will label these nodes with kserve/localmodel=worker.
                      Mutually exclusive with NodeSelector.
                    items:
                      type: string
                    minItems: 1
                    type: array
                  nodeSelector:
                    description: |-
                      NodeSelector is a label selector that identifies nodes for model caching
                      using pre-existing node labels (e.g., nvidia.com/gpu).
                      The operator will label matching nodes with kserve/localmodel=worker.
                      Mutually exclusive with NodeNames.
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                type: object
                x-kubernetes-validations:
                - message: cacheSize is required when managementState is Managed
                  rule: self.managementState != 'Managed' || has(self.cacheSize)
                - message: one non-empty nodeNames or nodeSelector is required when
                    managementState is Managed
                  rule: self.managementState != 'Managed' || (has(self.nodeNames)
                    && size(self.nodeNames) > 0) || (has(self.nodeSelector) && ((has(self.nodeSelector.matchLabels)
                    && size(self.nodeSelector.matchLabels) > 0) || (has(self.nodeSelector.matchExpressions)
                    && size(self.nodeSelector.matchExpressions) > 0)))
                - message: nodeNames and nodeSelector are mutually exclusive
                  rule: '!(has(self.nodeNames) && has(self.nodeSelector))'
              modelsAsService:
                description: Configures and enables Models as a Service integration
                properties:
                  managementState:
                    default: Removed
                    enum:
                    - Managed
                    - Removed
                    pattern: ^(Managed|Unmanaged|Force|Removed)$
                    type: string
                type: object
              nim:
                default: {}
                description: Configures and enables NVIDIA NIM integration
                properties:
                  airGapped:
                    default: false
                    description: |-
                      When true, NIM integration assumes an air-gapped cluster. External API calls
                      and the NIM model list ConfigMap creation are skipped, while status conditions
                      are marked successful with an air-gapped message.
                    type: boolean
                  managementState:
                    default: Managed
                    enum:
                    - Managed
                    - Removed
                    pattern: ^(Managed|Unmanaged|Force|Removed)$
                    type: string
                type: object
              oauthProxy:
                description: |-
                  Configures the OAuth proxy sidecar container resources in the
                  'inferenceservice-config' ConfigMap for KServe. Only non-nil fields
                  override the defaults shipped with the operator manifests.
                properties:
                  resources:
                    description: Resources describes the compute resource requirements
                      for the OAuth proxy sidecar container.
                    properties:
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: Limits describes the maximum amount of resources
                          allowed.
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: Requests describes the minimum amount of resources
                          required.
                        type: object
                    type: object
                type: object
              rawDeploymentServiceConfig:
                default: Headless
                description: |-
                  Configures the type of service that is created for InferenceServices using RawDeployment.
                  The values for RawDeploymentServiceConfig can be "Headless" (default value) or "Headed".
                  Headless: to set "ServiceClusterIPNone = true" in the 'inferenceservice-config' configmap for Kserve.
                  Headed: to set "ServiceClusterIPNone = false" in the 'inferenceservice-config' configmap for Kserve.
                enum:
                - Headless
                - Headed
                type: string
              wva:
                description: Configures and enables workload-variant-autoscaler (WVA)
                  integration
                properties:
                  managementState:
                    default: Removed
                    enum:
                    - Managed
                    - Removed
                    pattern: ^(Managed|Unmanaged|Force|Removed)$
                    type: string
                type: object
            type: object
          status:
            description: KserveStatus defines the observed state of Kserve
            properties:
              conditions:
                items:
                  properties:
                    lastHeartbeatTime:
                      description: |-
                        The last time we got an update on a given condition, this should not be set and is
                        present only for backward compatibility reasons
                      format: date-time
                      type: string
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.
                        If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: message is a human-readable message indicating
                        details about the transition.
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration
                        is 9, the condition is out of date with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        The value should be a CamelCase string.
                      type: string
                    severity:
                      description: |-
                        Severity with which to treat failures of this type of condition.
                        When this is not specified, it defaults to Error.
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              observedGeneration:
                description: The generation observed by the resource controller.
                format: int64
                type: integer
              phase:
                type: string
              releases:
                items:
                  description: ComponentRelease represents the detailed status of
