            form.
          displayName: GitOps
          path: gitOps
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:hidden
        - description: Namespace of the application-scoped Argo CD instance for this
            tenant entry (Helm application_gitops_namespace). AppProjects are created
            in this namespace. Each namespace entry can use a different instance.
          displayName: Application GitOps Namespace
          path: namespaces[0].applicationGitOpsNamespace
        - description: Argo CD AppProject for this tenant namespace. Set Application
