name: FBC Onboarding
on:
  workflow_dispatch:

jobs:
  onboard:
    name: Run FBC Onboarding
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run FBC onboarding
        working-directory: operators/apicurio-registry-3
        run: |
          make fbc-onboarding

      - name: Show generated files
        run: |
          echo "=== ci.yaml ==="
          cat operators/apicurio-registry-3/ci.yaml
          echo ""
          echo "=== catalog-templates ==="
          ls -la operators/apicurio-registry-3/catalog-templates/ || echo "No catalog-templates"
          echo ""
          echo "=== catalogs ==="
          find catalogs -name "catalog.yaml" -path "*/apicurio-registry-3/*" | sort
          echo ""
          echo "=== Sample template ==="
          cat operators/apicurio-registry-3/catalog-templates/v4.16.yaml 2>/dev/null | head -50 || echo "Not found"

      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b fbc/apicurio-registry-3-onboarding
          git add operators/apicurio-registry-3/{catalog-templates,ci.yaml,Makefile}
          git add catalogs/
          git commit -s -m "operator apicurio-registry-3: FBC onboarding (automated)"
          git push origin fbc/apicurio-registry-3-onboarding --force
