    description: |
      ## OpenShift Integration Operator

      **The missing lifecycle layer for Apache Camel on OpenShift** — an
      open-source, Kubernetes-native alternative to n8n that unifies
      integration design, deployment, and observability in a single operator.

      ### What Problem Does It Solve?

      Running integration workflows on Kubernetes requires stitching together
      multiple tools: a visual designer, CI/CD pipelines, GitOps controllers,
      and observability stacks. This operator eliminates that glue code by
      providing a single `IntegrationFlow` CRD that orchestrates the entire
      lifecycle — from visual design to production deployment with
      auto-scaling and real-time telemetry.

      ### Platform Components

      | Component | Role |
      |-----------|------|
      | **Apache Camel (Quarkus)** | Integration runtime engine — 300+ connectors |
      | **SonataFlow** | CNCF Serverless Workflow orchestration |
      | **Kaoto** | Visual drag-and-drop route designer |
      | **Tekton Pipelines** | CI/CD — builds worker images from scaffolded source |
      | **ArgoCD** | GitOps multi-cluster deployment |
      | **OpenTelemetry** | Distributed tracing and real-time SSE telemetry |
      | **Camel K** | Lightweight runtime for Kamelets and Pipes |

      ### OpenShift Console Dynamic Plugin

      This operator ships an **OpenShift Console dynamic plugin**
      (`integration-console-plugin`) that provides:

      * Integration Flows list with search, filters, and pagination
      * Visual SVG flow diagrams with click-to-YAML highlighting
      * Embedded Kaoto designer for drag-and-drop route editing
      * Real-time pod logs with container selector and follow mode
      * Platform Status dashboard (Operator, Kaoto, Gitea, ArgoCD, Tekton, OTel)
      * Lifecycle controls (Pause, Resume, Stop) with confirmation modals
      * Overview dashboard with KPI cards and distribution charts

      The plugin registers via the `console.openshift.io/plugins` annotation
      and requires no manual configuration after installation.

      ### Features

      * **Single CRD** — `IntegrationFlow` manages the full lifecycle of
        integration workflows across engines and deployment modes
      * **Five integration types** — Camel Route, Kamelet, Pipe, Test,
        and SonataFlow
      * **Ephemeral Quick Try** — deploy flows instantly without Git using
        domain-specific worker images (core, messaging, http, data, cloud,
        ai, full) with configurable TTL and auto-image-selection
      * **GitOps pipeline** — automated scaffolding to Git, Tekton builds,
        and ArgoCD multi-cluster deployment
      * **Multi-provider Git** — Gitea, GitHub, and GitLab with auto-detection
      * **MCP/AI Bridge** — Model Context Protocol for AI tool discovery
        and invocation within integration flows
      * **Resilience** — declarative retry policies, circuit breaker, and
        max inflight exchanges
      * **Observability** — OpenTelemetry tracing/metrics, PrometheusRule
        auto-generation, and real-time SSE telemetry overlay
      * **Auto-scaling** — HPA v2 on CPU and memory for worker pods
      * **Scheduled execution** — Cron-based flow triggering
      * **200+ ready flows** — Pre-built templates organized by pattern

      ### Deployment Modes

      * **GITOPS** — Full pipeline: scaffold to Git, Tekton builds Quarkus
        worker image, ArgoCD syncs to one or multiple clusters
      * **EPHEMERAL** — Quick Try mode: deploy directly in-cluster without
        Git, with configurable TTL, extend, and promote-to-GitOps

      ### Prerequisites

      * OpenShift 4.19+
      * Red Hat OpenShift Pipelines (Tekton) — for GitOps mode
      * Red Hat OpenShift GitOps (ArgoCD) — for GitOps mode
      * Camel K Operator (optional, for Kamelet/Pipe types)
      * OpenShift Serverless Logic (optional, for SonataFlow types)

      ### Getting Started

      1. Install the operator from OperatorHub
      2. Create an IntegrationFlow CR with your Camel or SonataFlow design
      3. The operator scaffolds, builds, and deploys your integration
      4. Monitor via the Console plugin or `oc get integrationflows`

      ### Quick Try (Ephemeral Mode)

      ```yaml
      apiVersion: platform.io/v1alpha1
      kind: IntegrationFlow
      metadata:
        name: quick-try-demo
      spec:
        engine: CAMEL
        deploymentMode: EPHEMERAL
        kaotoDesign: |
          - route:
              from:
                uri: "timer:tick"
                parameters:
                  period: 5000
                steps:
                  - log:
                      message: "Hello from Quick Try!"
        ephemeral:
          ttlSeconds: 3600
      ```
