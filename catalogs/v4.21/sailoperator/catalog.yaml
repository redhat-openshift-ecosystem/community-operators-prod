      - description: IstioCNI represents a deployment of the Istio CNI component.
        displayName: Istio CNI
        kind: IstioCNI
        name: istiocnis.sailoperator.io
        specDescriptors:
        - description: |-
            Defines the version of Istio to install.
            Must be one of: v1.29-latest, v1.29.1, v1.29.0, v1.28-latest, v1.28.5, v1.28.4, v1.28.3, v1.28.2, v1.28.1, v1.28.0, master, v1.30-alpha.0577d34d.
          displayName: Istio Version
          path: version
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:General
          - urn:alm:descriptor:com.tectonic.ui:select:v1.29-latest
          - urn:alm:descriptor:com.tectonic.ui:select:v1.29.1
          - urn:alm:descriptor:com.tectonic.ui:select:v1.29.0
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28-latest
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.5
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.4
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.3
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.2
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.1
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.0
          - urn:alm:descriptor:com.tectonic.ui:select:master
          - urn:alm:descriptor:com.tectonic.ui:select:v1.30-alpha.0577d34d
        - description: Namespace to which the Istio CNI component should be installed.
            Note that this field is immutable.
          displayName: Namespace
          path: namespace
          x-descriptors:
          - urn:alm:descriptor:io.kubernetes:Namespace
        - description: |-
            The built-in installation configuration profile to use.
            The 'default' profile is always applied. On OpenShift, the 'openshift' profile is also applied on top of 'default'.
            Must be one of: ambient, default, demo, empty, openshift, openshift-ambient, preview, remote, stable.
          displayName: Profile
          path: profile
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:General
          - urn:alm:descriptor:com.tectonic.ui:select:ambient
          - urn:alm:descriptor:com.tectonic.ui:select:default
          - urn:alm:descriptor:com.tectonic.ui:select:demo
          - urn:alm:descriptor:com.tectonic.ui:select:empty
          - urn:alm:descriptor:com.tectonic.ui:select:openshift
          - urn:alm:descriptor:com.tectonic.ui:select:openshift-ambient
          - urn:alm:descriptor:com.tectonic.ui:select:preview
          - urn:alm:descriptor:com.tectonic.ui:select:remote
          - urn:alm:descriptor:com.tectonic.ui:select:stable
        - description: Defines the values to be passed to the Helm charts when installing
            Istio CNI.
          displayName: Helm Values
          path: values
        version: v1
      - description: |-
          IstioRevision represents a single revision of an Istio Service Mesh deployment.
          Users shouldn't create IstioRevision objects directly. Instead, they should
          create an Istio object and allow the operator to create the underlying
          IstioRevision object(s).
        displayName: Istio Revision
        kind: IstioRevision
        name: istiorevisions.sailoperator.io
        specDescriptors:
        - description: |-
            Defines the version of Istio to install.
            Must be one of: v1.29.1, v1.29.0, v1.28.5, v1.28.4, v1.28.3, v1.28.2, v1.28.1, v1.28.0, v1.30-alpha.0577d34d.
