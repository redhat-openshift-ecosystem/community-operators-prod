    - supported: true
      type: OwnNamespace
    - supported: true
      type: SingleNamespace
    - supported: true
      type: MultiNamespace
    - supported: true
      type: AllNamespaces
    keywords:
    - infinispan
    - key value
    - database
    - datagrid
    - open source
    labels:
      operatorframework.io/arch.amd64: supported
      operatorframework.io/arch.arm64: supported
    links:
