                  properties:
                    name:
                      type: string
                    repoUrl:
                      type: string
                    version:
                      type: string
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
        type: object
        x-kubernetes-validations:
        - message: Kserve name must be default-kserve
          rule: self.metadata.name == 'default-kserve'
