      - v1.26.5
      - v1.26.4
      - v1.26.3
      - v1.26.2
      - v1.26.1
      - v1.26.0

      [See this page](https://github.com/istio-ecosystem/sail-operator/blob/main/bundle/README.md) for instructions on how to use it.
    displayName: Sail Operator
    installModes:
    - supported: false
      type: OwnNamespace
    - supported: false
      type: SingleNamespace
    - supported: false
      type: MultiNamespace
    - supported: true
      type: AllNamespaces
    keywords:
    - istio
    - servicemesh
    - envoy
    labels:
      operatorframework.io/arch.amd64: supported
      operatorframework.io/arch.arm64: supported
      operatorframework.io/arch.ppc64le: supported
      operatorframework.io/arch.s390x: supported
    links:
    - name: Istio Project
      url: https://istio.io
    maintainers:
    - email: istio-feedback@redhat.com
      name: OpenShift Service Mesh Team
    maturity: alpha
    provider:
