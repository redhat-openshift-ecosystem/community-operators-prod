      - description: IstioRevisionTag references an Istio or IstioRevision object
          and serves as an alias for sidecar injection. It can be used to manage stable
          revision tags without having to use istioctl or helm directly. See https://istio.io/latest/docs/setup/upgrade/canary/#stable-revision-labels
          for more information on the concept.
        displayName: Istio Revision Tag
        kind: IstioRevisionTag
        name: istiorevisiontags.sailoperator.io
        version: v1
      - description: |-
          Istio represents an Istio Service Mesh deployment consisting of one or more
          control plane instances (represented by one or more IstioRevision objects).
          To deploy an Istio Service Mesh, a user creates an Istio object with the
          desired Istio version and configuration. The operator then creates
          an IstioRevision object, which in turn creates the underlying Deployment
          objects for istiod and other control plane components, similar to how a
          Deployment object in Kubernetes creates ReplicaSets that create the Pods.
        displayName: Istio
        kind: Istio
        name: istios.sailoperator.io
        specDescriptors:
        - description: "Type of strategy to use. Can be \"InPlace\" or \"RevisionBased\".
            When the \"InPlace\" strategy\nis used, the existing Istio control plane
            is updated in-place. The workloads therefore\ndon't need to be moved from
            one control plane instance to another. When the \"RevisionBased\"\nstrategy
            is used, a new Istio control plane instance is created for every change
            to the\nIstio.spec.version field. The old control plane remains in place
            until all workloads have\nbeen moved to the new control plane instance.\n\nThe
            \"InPlace\" strategy is the default.\tTODO: change default to \"RevisionBased\""
          displayName: Type
          path: updateStrategy.type
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:select:InPlace
          - urn:alm:descriptor:com.tectonic.ui:select:RevisionBased
        - description: |-
            Defines the version of Istio to install.
            Must be one of: v1.27-latest, v1.27.2, v1.27.1, v1.27.0, v1.26-latest, v1.26.5, v1.26.4, v1.26.3, v1.26.2, v1.26.1, v1.26.0, v1.25-latest, v1.25.5, v1.25.4, v1.25.3, v1.25.2, v1.25.1, v1.24-latest, v1.24.6, v1.24.5, v1.24.4, v1.24.3, v1.24.2, v1.24.1, v1.24.0.
          displayName: Istio Version
          path: version
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:General
          - urn:alm:descriptor:com.tectonic.ui:select:v1.27-latest
          - urn:alm:descriptor:com.tectonic.ui:select:v1.27.2
          - urn:alm:descriptor:com.tectonic.ui:select:v1.27.1
          - urn:alm:descriptor:com.tectonic.ui:select:v1.27.0
          - urn:alm:descriptor:com.tectonic.ui:select:v1.26-latest
          - urn:alm:descriptor:com.tectonic.ui:select:v1.26.5
          - urn:alm:descriptor:com.tectonic.ui:select:v1.26.4
          - urn:alm:descriptor:com.tectonic.ui:select:v1.26.3
          - urn:alm:descriptor:com.tectonic.ui:select:v1.26.2
          - urn:alm:descriptor:com.tectonic.ui:select:v1.26.1
          - urn:alm:descriptor:com.tectonic.ui:select:v1.26.0
          - urn:alm:descriptor:com.tectonic.ui:select:v1.25-latest
          - urn:alm:descriptor:com.tectonic.ui:select:v1.25.5
          - urn:alm:descriptor:com.tectonic.ui:select:v1.25.4
          - urn:alm:descriptor:com.tectonic.ui:select:v1.25.3
          - urn:alm:descriptor:com.tectonic.ui:select:v1.25.2
          - urn:alm:descriptor:com.tectonic.ui:select:v1.25.1
          - urn:alm:descriptor:com.tectonic.ui:select:v1.24-latest
          - urn:alm:descriptor:com.tectonic.ui:select:v1.24.6
          - urn:alm:descriptor:com.tectonic.ui:select:v1.24.5
          - urn:alm:descriptor:com.tectonic.ui:select:v1.24.4
          - urn:alm:descriptor:com.tectonic.ui:select:v1.24.3
          - urn:alm:descriptor:com.tectonic.ui:select:v1.24.2
          - urn:alm:descriptor:com.tectonic.ui:select:v1.24.1
          - urn:alm:descriptor:com.tectonic.ui:select:v1.24.0
        - description: |-
            Defines how many seconds the operator should wait before removing a non-active revision after all
            the workloads have stopped using it. You may want to set this value on the order of minutes.
            The minimum is 0 and the default value is 30.
          displayName: Inactive Revision Deletion Grace Period (seconds)
          path: updateStrategy.inactiveRevisionDeletionGracePeriodSeconds
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:number
        - description: |-
            Defines whether the workloads should be moved from one control plane instance to another
            automatically. If updateWorkloads is true, the operator moves the workloads from the old
            control plane instance to the new one after the new control plane is ready.
            If updateWorkloads is false, the user must move the workloads manually by updating the
            istio.io/rev labels on the namespace and/or the pods.
            Defaults to false.
          displayName: Update Workloads Automatically
          path: updateStrategy.updateWorkloads
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
        - description: Namespace to which the Istio components should be installed.
            Note that this field is immutable.
          displayName: Namespace
          path: namespace
          x-descriptors:
          - urn:alm:descriptor:io.kubernetes:Namespace
        - description: |-
            The built-in installation configuration profile to use.
            The 'default' profile is always applied. On OpenShift, the 'openshift' profile is also applied on top of 'default'.
            Must be one of: ambient, default, demo, empty, openshift, openshift-ambient, preview, remote, stable.
          displayName: Profile
          path: profile
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:General
          - urn:alm:descriptor:com.tectonic.ui:select:ambient
          - urn:alm:descriptor:com.tectonic.ui:select:default
