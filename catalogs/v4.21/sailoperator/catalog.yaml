          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.4
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.3
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.2
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.1
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.0
          - urn:alm:descriptor:com.tectonic.ui:select:master
          - urn:alm:descriptor:com.tectonic.ui:select:v1.30-alpha.0577d34d
        - description: Namespace to which the Istio ztunnel component should be installed.
          displayName: Namespace
          path: namespace
          x-descriptors:
          - urn:alm:descriptor:io.kubernetes:Namespace
        - description: Defines the values to be passed to the Helm charts when installing
