          - urn:alm:descriptor:com.tectonic.ui:select:v1.28-latest
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.3
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.2
          - urn:alm:descriptor:com.tectonic.ui:select:v1.28.1
