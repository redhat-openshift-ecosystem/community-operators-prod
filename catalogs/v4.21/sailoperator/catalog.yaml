          - urn:alm:descriptor:com.tectonic.ui:select:remote
          - urn:alm:descriptor:com.tectonic.ui:select:stable
        - description: Defines the update strategy to use when the version in the
            Istio CR is updated.
          displayName: Update Strategy
          path: updateStrategy
        - description: Defines the values to be passed to the Helm charts when installing
            Istio.
          displayName: Helm Values
          path: values
        version: v1
      - description: ZTunnel represents a deployment of the Istio ztunnel component.
        displayName: ZTunnel
        kind: ZTunnel
        name: ztunnels.sailoperator.io
